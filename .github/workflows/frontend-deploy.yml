name: Deploy Frontend (S3 + CloudFront)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: app.cometahub.com
  CLOUDFRONT_DISTRIBUTION_ID: E3P0HGOPE2K0J8

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instala e builda
        working-directory: frontend
        env:
          VITE_API_URL: https://api.cometahub.com
        run: |
          npm ci
          npm run build

      - name: Configura credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync para o S3
        working-directory: frontend
        run: |
          aws s3 sync dist s3://$S3_BUCKET --delete --exclude index.html \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache" --content-type "text/html"

      - name: Invalida cache do CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*" >/dev/null
