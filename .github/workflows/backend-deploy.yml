name: Deploy Backend (ECS)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: cometahub-backend
  ECS_CLUSTER: cometahub-cluster
  ECS_SERVICE: cometahub-backend-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configura credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push da imagem
        working-directory: backend
        run: |
          REG=${{ steps.ecr.outputs.registry }}
          IMG=$REG/$ECR_REPO
          docker build --platform linux/amd64 -t $IMG:latest -t $IMG:${{ github.sha }} .
          docker push $IMG:latest
          docker push $IMG:${{ github.sha }}

      - name: Deploy no ECS (se o serviço já existir)
        run: |
          ST=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE \
            --region $AWS_REGION --query 'services[0].status' --output text 2>/dev/null || echo NONE)
          if [ "$ST" = "ACTIVE" ]; then
            echo "Serviço ativo — forçando novo deploy."
            aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE \
              --force-new-deployment --region $AWS_REGION >/dev/null
          else
            echo "Serviço ainda não criado (bootstrap) — imagem enviada ao ECR, deploy será feito na criação do serviço."
          fi
